appId: com.commandcabin.app
productName: CommandCabin
copyright: Copyright © 2026 CommandCabin
electronVersion: 39.0.0
asar: false
afterPack: apps/desktop/scripts/after-pack-windows-icon.cjs

directories:
  app: apps/desktop
  buildResources: apps/desktop/build
  output: release

extraMetadata:
  name: command-cabin
  productName: CommandCabin
  main: out/main/index.js

files:
  - out/**
  - package.json
  - build/icon.ico
  - '!**/*.map'
  - '!**/*.test.*'
  - '!**/*.tsbuildinfo'
  - '!src/**'
  - '!node_modules/@command-cabin/**/src/**'
  - '!**/tests/**'
  - '!**/vitest.config.*'
  - '!**/tsconfig*.json'
  - '!node_modules/@command-cabin/**/dist/*.tsbuildinfo'
  - '!node_modules/@command-cabin/**/tsconfig*.json'
  - '!node_modules/@command-cabin/**/vitest.config.*'

win:
  icon: apps/desktop/build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  include: apps/desktop/build/installer.nsh
  artifactName: CommandCabin-${version}-${arch}-Setup.${ext}
  installerIcon: apps/desktop/build/icon.ico
  uninstallerIcon: apps/desktop/build/icon.ico
  shortcutName: CommandCabin
  uninstallDisplayName: CommandCabin
  createDesktopShortcut: always
  createStartMenuShortcut: true

publish:
  - provider: github
    owner: RupingLiu
    repo: command-cabin
